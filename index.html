<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioregional Trailblazer HUB</title>
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,400;1,800&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component for UMD Lucide
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div class={`bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden ${className}`}>
                {children}
            </div>
        );

        // --- INDIVIDUAL TOOLS ---

        const WatershedTool = () => {
            const [roof, setRoof] = useState(1000);
            const [rain, setRain] = useState(30);
            const yieldVal = Math.round(roof * rain * 0.623 * 0.85);
            return (
                <div class="space-y-6 animate-fade-in">
                    <div class="grid md:grid-cols-2 gap-6">
                        <Card class="p-8 space-y-4">
                            <h3 class="font-black text-blue-600 uppercase text-xs tracking-widest flex items-center gap-2">
                                <LucideIcon name="droplets" /> Site Parameters
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Roof Size (sq ft)</label>
                                    <input type="number" value={roof} onChange={e => setRoof(e.target.value)} class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Annual Rainfall (inches)</label>
                                    <input type="number" value={rain} onChange={e => setRain(e.target.value)} class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                            </div>
                        </Card>
                        <div class="bg-blue-600 rounded-[2rem] p-10 text-white flex flex-col justify-center text-center shadow-xl">
                            <span class="text-[10px] font-black uppercase tracking-[0.3em] opacity-60">Calculated Yield</span>
                            <div class="text-6xl font-black my-2">{yieldVal.toLocaleString()}</div>
                            <span class="text-xl font-bold opacity-80">Gallons / Year</span>
                        </div>
                    </div>
                </div>
            );
        };

        const CompostTool = () => {
            const [browns, setBrowns] = useState(3);
            const [greens, setGreens] = useState(2);
            return (
                <Card class="p-10 animate-fade-in">
                    <div class="grid md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <h3 class="font-black text-emerald-600 uppercase text-xs tracking-widest flex items-center gap-2">
                                <LucideIcon name="sprout" /> 3:2:1 Balancer
                            </h3>
                            <div class="space-y-6">
                                <div>
                                    <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-2">
                                        <span>Carbon (Browns)</span>
                                        <span class="text-emerald-600">{browns} Parts</span>
                                    </div>
                                    <input type="range" min="1" max="10" value={browns} onChange={e => setBrowns(e.target.value)} class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-emerald-600" />
                                </div>
                                <div>
                                    <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-2">
                                        <span>Nitrogen (Greens)</span>
                                        <span class="text-emerald-600">{greens} Parts</span>
                                    </div>
                                    <input type="range" min="1" max="10" value={greens} onChange={e => setGreens(e.target.value)} class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-emerald-600" />
                                </div>
                            </div>
                        </div>
                        <div class="bg-emerald-50 rounded-3xl p-8 border border-emerald-100 text-center">
                            <div class="flex justify-center mb-4 text-emerald-600"><LucideIcon name="thermometer" size={48} /></div>
                            <h4 class="text-xl font-black text-emerald-900 italic">Target: 135°F - 160°F</h4>
                            <p class="text-xs text-emerald-700 mt-2 leading-relaxed">Turn on Day 4, then every 2 days for 18 total days (Berkeley Method).</p>
                        </div>
                    </div>
                </Card>
            );
        };

        const EconomyTool = () => {
            const [global, setGlobal] = useState(1200);
            const [local, setLocal] = useState(400);
            const rate = Math.round((local / (global + local)) * 100);
            return (
                <div class="space-y-6 animate-fade-in">
                    <div class="grid md:grid-cols-2 gap-6">
                        <Card class="p-8 space-y-6">
                            <h3 class="font-black text-rose-500 uppercase text-xs tracking-widest">Dollar Leakage Audit</h3>
                            <div class="space-y-4">
                                <input type="number" value={global} onChange={e => setGlobal(Number(e.target.value))} class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Global Monthly Spend" />
                                <input type="number" value={local} onChange={e => setLocal(Number(e.target.value))} class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Local Monthly Spend" />
                            </div>
                        </Card>
                        <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white flex flex-col justify-center shadow-2xl relative overflow-hidden">
                            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-emerald-400">Retention Score</span>
                            <div class="text-7xl font-black my-4">{rate}%</div>
                            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden flex">
                                <div class="bg-emerald-500 h-full" style={{ width: `${rate}%` }}></div>
                                <div class="bg-rose-500 h-full" style={{ width: `${100-rate}%` }}></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LegacyTool = () => {
            const [input, setInput] = useState('');
            const [done, setDone] = useState(false);
            return (
                <Card class="bg-stone-800 p-12 text-center text-stone-100 animate-fade-in border-none">
                    {!done ? (
                        <div class="max-w-xl mx-auto space-y-8">
                            <div class="text-amber-500 flex justify-center"><LucideIcon name="history" size={48} /></div>
                            <h3 class="text-3xl font-serif italic">What gift from the ancestors do you carry into today?</h3>
                            <input value={input} onChange={e => setInput(e.target.value)} class="w-full bg-transparent border-b border-stone-600 p-4 text-xl outline-none italic text-amber-200 focus:border-amber-500 text-center" placeholder="A value, a skill, a memory..." />
                            <button onClick={() => setDone(true)} class="bg-amber-600 text-stone-900 px-12 py-3 rounded-full font-black uppercase text-xs tracking-widest">Enter the Stream</button>
                        </div>
                    ) : (
                        <div class="max-w-2xl mx-auto space-y-8">
                            <div class="text-rose-500 flex justify-center"><LucideIcon name="heart" size={48} /></div>
                            <div class="p-10 bg-stone-900/50 rounded-3xl border-l-4 border-amber-600 text-left">
                                <p class="text-xl italic font-serif leading-relaxed">
                                    "I acknowledge the gift of <span class="text-amber-200 underline">{input}</span>. Today, in this moment of metacrisis, I commit my biophilic energy to the restoration of this Life-Place for the next seven generations."
                                </p>
                            </div>
                            <button onClick={() => setDone(false)} class="text-stone-500 uppercase text-[10px] font-black tracking-widest hover:text-white transition-colors">Start New Cycle</button>
                        </div>
                    )}
                </Card>
            );
        };

        // --- MAIN APP SHELL ---

        function App() {
            const [tab, setTab] = useState('overview');

            const menu = [
                { id: 'overview', label: 'Overview', icon: 'layout-dashboard', color: 'text-slate-500' },
                { id: 'watershed', label: 'Ecology', icon: 'droplets', color: 'text-blue-500' },
                { id: 'soil', label: 'Fertility', icon: 'sprout', color: 'text-emerald-500' },
                { id: 'economy', label: 'Wallet', icon: 'trending-down', color: 'text-rose-500' },
                { id: 'legacy', label: 'Vision', icon: 'hourglass', color: 'text-amber-500' }
            ];

            const render = () => {
                switch(tab) {
                    case 'watershed': return <WatershedTool />;
                    case 'soil': return <CompostTool />;
                    case 'economy': return <EconomyTool />;
                    case 'legacy': return <LegacyTool />;
                    default: return (
                        <div class="space-y-8 animate-fade-in">
                            <div class="grid md:grid-cols-3 gap-6">
                                <Card class="p-6 border-l-4 border-blue-500"><div class="flex items-center gap-4"><div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><LucideIcon name="droplets" /></div><div><p class="text-[10px] font-black text-slate-400 uppercase">Water potential</p><p class="text-xl font-black">18.4K Gal</p></div></div></Card>
                                <Card class="p-6 border-l-4 border-emerald-500"><div class="flex items-center gap-4"><div class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl"><LucideIcon name="sprout" /></div><div><p class="text-[10px] font-black text-slate-400 uppercase">Soil Fitness</p><p class="text-xl font-black">Optimum</p></div></div></Card>
                                <Card class="p-6 border-l-4 border-rose-500"><div class="flex items-center gap-4"><div class="p-3 bg-rose-50 text-rose-600 rounded-2xl"><LucideIcon name="trending-up" /></div><div><p class="text-[10px] font-black text-slate-400 uppercase">Retention</p><p class="text-xl font-black">+12.4%</p></div></div></Card>
                            </div>
                            <div class="bg-slate-900 rounded-[3rem] p-12 text-white relative overflow-hidden shadow-2xl">
                                <div class="max-w-xl relative z-10">
                                    <h2 class="text-5xl font-black italic tracking-tighter mb-6 leading-none">Welcome Explorer.</h2>
                                    <p class="text-slate-400 text-lg leading-relaxed mb-10">This dashboard is your interface with the living world. Move beyond the static screen and start mapping the <strong>Life-Place</strong> where you stand.</p>
                                    <button onClick={() => setTab('watershed')} class="bg-white text-slate-900 px-10 py-4 rounded-full font-black uppercase text-xs tracking-widest hover:scale-105 transition-transform flex items-center gap-2">Activate Action Map <LucideIcon name="arrow-right" size={16} /></button>
                                </div>
                                <div class="absolute -bottom-20 -right-20 opacity-5 text-white pointer-events-none"><LucideIcon name="globe" size={400} /></div>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div class="min-h-screen flex text-slate-900">
                    <aside class="w-20 md:w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
                        <div class="p-8 border-b border-slate-50 hidden md:block">
                            <div class="flex items-center gap-3"><div class="w-10 h-10 bg-slate-900 text-white rounded-2xl flex items-center justify-center"><LucideIcon name="globe" /></div><span class="font-black uppercase tracking-tighter italic">Trailblazer</span></div>
                        </div>
                        <nav class="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto">
                            {menu.map(i => (
                                <button key={i.id} onClick={() => setTab(i.id)} class={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${tab === i.id ? 'bg-slate-900 text-white shadow-xl translate-x-1' : 'text-slate-500 hover:bg-slate-100'}`}>
                                    <span class={tab === i.id ? 'text-white' : i.color}><LucideIcon name={i.icon} /></span>
                                    <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">{i.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>
                    <main class="flex-1 overflow-y-auto bg-slate-50/30">
                        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-10 py-6 sticky top-0 z-20 flex justify-between items-center">
                            <h1 class="text-xl font-black italic tracking-tight">Bioregional HUB</h1>
                            <div class="hidden md:flex gap-4">
                                <div class="bg-slate-100 px-5 py-2 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div> Local Watershed: <span class="text-slate-900">Mapped</span>
                                </div>
                            </div>
                        </header>
                        <div class="p-10 max-w-6xl mx-auto min-h-screen">{render()}</div>
                        <footer class="p-10 border-t border-slate-200 text-[10px] font-black uppercase tracking-[0.3em] text-slate-300 flex justify-between">
                            <span>Dancing with the Elephant</span>
                            <span>v2.0 Systems-Health</span>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
