<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioregional Trailblazer HUB v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .wisdom-panel { border-left: 5px solid #1e293b; background: white; }
        .action-panel { border-left: 5px solid #2563eb; background: #0f172a; color: white; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .prose p { margin-bottom: 1.25rem; line-height: 1.8; color: #334155; }
        .prose h3 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.75rem; margin-bottom: 1.25rem; color: #0f172a; }
        .prose strong { color: #1e293b; font-weight: 700; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- SHARED UI ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`rounded-3xl shadow-sm overflow-hidden ${className}`}>
                {children}
            </div>
        );

        // --- LESSON ARCHITECTURE ---
        const ModuleFrame = ({ title, subtitle, wisdom, activation }) => (
            <div className="animate-in space-y-10">
                <header className="border-b border-slate-200 pb-8">
                    <div className="flex items-center gap-3 text-blue-600 mb-2">
                        <div className="h-px w-8 bg-blue-600"></div>
                        <span className="text-[11px] font-black uppercase tracking-[0.4em]">{subtitle}</span>
                    </div>
                    <h1 className="text-5xl font-serif italic text-slate-900 tracking-tight">{title}</h1>
                </header>

                <div className="grid lg:grid-cols-5 gap-8">
                    <div className="lg:col-span-3 wisdom-panel p-10 rounded-3xl shadow-lg border border-slate-100 prose max-w-none">
                        <div className="flex items-center gap-2 mb-8 text-slate-400">
                            <Icon name="book-open" size={18} />
                            <span className="text-xs font-black uppercase tracking-[0.2em]">Curriculum Text</span>
                        </div>
                        {wisdom}
                    </div>

                    <div className="lg:col-span-2 action-panel p-10 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col">
                        <div className="flex items-center gap-2 mb-8 text-blue-400">
                            <Icon name="zap" size={18} />
                            <span className="text-xs font-black uppercase tracking-[0.2em]">Interactive Tool</span>
                        </div>
                        <div className="relative z-10 flex-1">{activation}</div>
                        <Icon name="mountain" size={400} className="absolute -bottom-32 -right-32 opacity-[0.03] pointer-events-none" />
                    </div>
                </div>
            </div>
        );

        // --- MODULE 1: THE METACRISIS ---
        const HeadModule = () => {
            const [roof, setRoof] = useState(1000);
            const [rain, setRain] = useState(32);
            const yieldGal = Math.round(roof * rain * 0.623 * 0.85);

            return (
                <ModuleFrame 
                    title="The Global Shadow"
                    subtitle="Module 1: Ecology & Systems"
                    wisdom={
                        <div>
                            <h3>Meeting the New Elephant</h3>
                            <p>We used to say the "elephant in the room" was just our personal secrets—the old traumas and Western denial of death. But today, that elephant has grown. It is the <strong>Metacrisis</strong>: a convergence of ecological breakdown, social fragmentation, and economic instability.</p>
                            <p>Driven by <strong>Ecological Overshoot</strong>, modern society is spending from a "Cosmic Credit Card" that is finally being declined. We use resources far faster than a finite planet can regenerate them. This results in <strong>Energy Blindness</strong>: our collective failure to recognize that our complex world is fueled by a one-time "carbon pulse" of ancient sunlight.</p>
                            <p>To survive this bottleneck, we must move from <em>Self-Help</em> to <strong>Systems-Health</strong>. Saving oneself and saving the world are now the exact same dance.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mt-8">
                                <h4 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-2">Key Concept</h4>
                                <p className="text-sm italic m-0">"You are not just chemically connected to stars; you are biologically connected to soil. Your talents must serve the restoration of the web of life."</p>
                            </div>
                        </div>
                    }
                    activation={
                        <div className="space-y-8">
                            <p className="text-blue-200 text-sm italic">Calculate your Micro-Watershed annual yield to understand the currency of life in your specific place.</p>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Roof Area (sq ft)</label>
                                    <input type="number" value={roof} onChange={e => setRoof(e.target.value)} className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Annual Rainfall (inches)</label>
                                    <input type="number" value={rain} onChange={e => setRain(e.target.value)} className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
                                </div>
                            </div>
                            <div className="p-8 bg-blue-600 rounded-[2rem] text-center shadow-xl">
                                <span className="text-[10px] font-black uppercase tracking-widest opacity-60">Potential Harvest</span>
                                <div className="text-5xl font-black my-2 tabular-nums">{yieldGal.toLocaleString()}</div>
                                <span className="text-sm font-bold">Gallons / Year</span>
                            </div>
                        </div>
                    }
                />
            );
        };

        // --- MODULE 2: REINHABITATION ---
        const PlaceModule = () => {
            const [assets, setAssets] = useState([
                { name: 'Community Seed Bank', strength: 3 },
                { name: 'Local Tool Library', strength: 2 }
            ]);
            const [input, setInput] = useState('');

            return (
                <ModuleFrame 
                    title="Finding Your Life-Place"
                    subtitle="Module 2: Bioregionalism"
                    wisdom={
                        <div>
                            <h3>The Art of Reinhabitation</h3>
                            <p>A <strong>Bioregion</strong> is not defined by zip codes or political lines. It is a "life-place" defined by the Earth's natural boundaries—mountain ranges, soil types, and <strong>Watersheds</strong>. A watershed is the primary unit of ecological governance.</p>
                            <p><strong>Reinhabitation</strong> means learning to live as a responsible, long-term steward of your specific home. It is the conscious decision to become "native" to your place, ensuring the seventh generation inherits its health.</p>
                            <p>By mapping your bioregion, you discover <strong>Shadow Assets</strong>: the hidden skills, tools, and natural capitals already present in your neighborhood that global corporate systems have taught you to ignore. Building <strong>Systemic Trust</strong> is the ultimate survival technology.</p>
                        </div>
                    }
                    activation={
                        <div className="space-y-8">
                            <div className="flex gap-2">
                                <input value={input} onChange={e => setInput(e.target.value)} placeholder="Asset (e.g. Master Gardener)" className="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" />
                                <button onClick={() => { if(input) { setAssets([{name: input, strength: 2}, ...assets]); setInput(''); }}} className="bg-blue-600 px-6 rounded-2xl font-black text-xs">LOG</button>
                            </div>
                            <div className="space-y-3">
                                {assets.map((a, i) => (
                                    <div key={i} className="p-5 bg-slate-800 rounded-2xl border border-slate-700 flex justify-between items-center group">
                                        <span className="font-bold text-sm">{a.name}</span>
                                        <div className="flex gap-1">
                                            {[1,2,3].map(dot => <div key={dot} className={`w-2 h-2 rounded-full ${dot <= a.strength ? 'bg-blue-400' : 'bg-slate-600'}`} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    }
                />
            );
        };

        // --- MODULE 3: SOUL (ACTIVE HOPE) ---
        const HeartModule = () => (
            <ModuleFrame 
                title="The Spiral of Resilience"
                subtitle="Module 3: Inner Transformation"
                wisdom={
                    <div>
                        <h3>Active Hope & Solastalgia</h3>
                        <p><strong>Solastalgia</strong> is the profound emotional distress caused by environmental degradation of one's home landscape. We address this using <strong>Active Hope</strong>—not a feeling you have, but a practice you do.</p>
                        <p>We utilize the 4-stage Spiral of the <em>Work That Reconnects</em>:</p>
                        <ul className="space-y-4">
                            <li><strong>1. Coming from Gratitude:</strong> Grounding the mind by valuing what is worth protecting.</li>
                            <li><strong>2. Honoring the Pain:</strong> Refusing to suppress grief, seeing it as evidence of our interconnectedness.</li>
                            <li><strong>3. Seeing with New Eyes:</strong> Shifting from a mechanistic view to a systems-view where we are cells in a larger living body.</li>
                            <li><strong>4. Going Forth:</strong> Identifying your unique <strong>Biophilic Energy</strong> and taking the smallest, most immediate step.</li>
                        </ul>
                    </div>
                }
                activation={
                    <div className="space-y-8">
                        <div className="p-8 bg-slate-800/50 rounded-3xl border-l-4 border-rose-500 text-center">
                            <Icon name="message-circle" size={48} className="text-rose-400 mx-auto mb-6" />
                            <h4 className="text-lg italic font-serif leading-relaxed">"What shared value do you and your opponent both want to protect?"</h4>
                            <textarea className="w-full mt-8 bg-slate-900 p-5 rounded-2xl border border-slate-700 text-slate-300 outline-none" rows="4" placeholder="Socratic Reflection..." />
                            <button className="mt-6 bg-white text-slate-900 px-10 py-3 rounded-full font-black uppercase text-xs tracking-widest shadow-xl">Commit to Resolution</button>
                        </div>
                    </div>
                }
            />
        );

        // --- MODULE 4: SKILLS (FERTILITY) ---
        const HandsModule = () => (
            <ModuleFrame 
                title="The Engine of Fertility"
                subtitle="Module 4: Regenerative Skills"
                wisdom={
                    <div>
                        <h3>The Master Compost Pile</h3>
                        <p>In the Localization Movement, waste is simply <strong>Natural Capital</strong> that hasn't been cycled yet. We use the <strong>3-2-1 Mantra</strong> to build biological life in the soil:</p>
                        <ul className="space-y-4">
                            <li><strong>3 Parts Carbon (Browns):</strong> Dry materials like woodchips or straw. This is the pile's battery.</li>
                            <li><strong>2 Parts Nitrogen (Greens):</strong> Fresh greens or food scraps. This is the fuel.</li>
                            <li><strong>1 Part Activator:</strong> Manure or comfrey. This is the spark.</li>
                        </ul>
                        <p><strong>The Berkeley Method:</strong> A specific 18-day turning schedule that mimics the vertical stacking and decomposition patterns of a climax forest floor.</p>
                    </div>
                }
                activation={
                    <div className="space-y-8">
                         <div className="grid grid-cols-3 gap-2 h-24">
                            <div className="bg-amber-900 rounded-2xl flex items-center justify-center text-[10px] font-black uppercase border border-amber-800">Carbon</div>
                            <div className="bg-emerald-600 rounded-2xl flex items-center justify-center text-[10px] font-black uppercase border border-emerald-500">Nitrogen</div>
                            <div className="bg-emerald-900 rounded-2xl flex items-center justify-center text-[10px] font-black uppercase border border-emerald-800">Activator</div>
                         </div>
                         <div className="bg-slate-800/50 p-8 rounded-[2rem] border border-slate-700 text-center">
                            <Icon name="thermometer" size={40} className="text-emerald-400 mx-auto mb-4" />
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">PILE STATUS</span>
                            <div className="text-4xl font-black text-emerald-400 mt-2 italic tracking-tighter">Thermophilic (145°F)</div>
                            <p className="text-xs text-slate-400 mt-4 leading-relaxed">Turn pile on Day 4 to move outer material into the high-heat center.</p>
                         </div>
                    </div>
                }
            />
        );

        // --- MODULE 5: ECONOMY ---
        const EconomyModule = () => (
            <ModuleFrame 
                title="Plugging the Leaks"
                subtitle="Module 5: Bioregional Wallet"
                wisdom={
                    <div>
                        <h3>The Economics of Happiness</h3>
                        <p>Global corporatism is a "leaky bucket" for local wealth. Localization aims to shorten the distance between producer and consumer.</p>
                        <p><strong>The Multiplier Effect:</strong> A dollar spent at a local farm cycles 3-7 times through local services (mechanics, builders, markets), effectively creating exponential wealth for your neighbors.</p>
                        <p>True prosperity is measured by <strong>Gross National Happiness (GNH)</strong>, not GDP. It values time, community participation, and ecological stability over endless material consumption.</p>
                    </div>
                }
                activation={
                    <div className="space-y-8">
                        <div className="p-10 bg-slate-800/50 rounded-[2.5rem] border border-slate-700 shadow-xl text-center relative overflow-hidden">
                             <span className="text-[10px] font-black uppercase tracking-[0.4em] text-blue-400">Retention Score</span>
                             <div className="text-8xl font-black my-4 tracking-tighter italic">25%</div>
                             <div className="w-full h-3 bg-slate-900 rounded-full overflow-hidden mb-6 flex">
                                <div className="bg-blue-600 h-full w-1/4" />
                                <div className="bg-rose-600 h-full w-3/4 opacity-20" />
                             </div>
                             <p className="text-sm text-slate-400 leading-relaxed italic max-w-sm mx-auto">"Substitution Strategy: Shift $100 from global supermarkets to a local CSA box to plug regional leakage."</p>
                        </div>
                    </div>
                }
            />
        );

        // --- MODULE 6: LEGACY ---
        const VisionModule = () => (
            <ModuleFrame 
                title="The Ancestral Covenant"
                subtitle="Module 6: Vision & Deep Time"
                wisdom={
                    <div>
                        <h3>The Seventh Generation Lens</h3>
                        <p>Modern choices are made in seconds but last for centuries. A plastic bottle outlives your grandchildren. We use <strong>Deep Time</strong> to filter our choices.</p>
                        <p><strong>Cosmic Legacy:</strong> Your impact is not measured in memories, but in the physical restoration of the biosphere. You are the <strong>Ancestor of the Future</strong>.</p>
                        <p>Building a <strong>Bioregional Action Map</strong> transforms your individual desire for growth into a collective <strong>Planetary Call to Adventure</strong>.</p>
                    </div>
                }
                activation={
                    <div className="space-y-8">
                         <div className="p-10 bg-blue-600 rounded-[3rem] shadow-2xl text-left border-l-8 border-white italic relative">
                            <Icon name="history" size={120} className="absolute -top-10 -right-10 text-white/10" />
                            <p className="text-xl font-serif leading-relaxed text-white relative z-10">"I commit my unique creative power to the restoration of this Life-Place, ensuring that children born 200 years from now experience clean water and systemic trust as their birthright."</p>
                            <button className="mt-8 bg-white text-blue-900 px-10 py-3 rounded-full font-black uppercase tracking-widest text-[10px] hover:scale-105 transition-all">Record in Action Map</button>
                         </div>
                    </div>
                }
            />
        );

        // --- MAIN APP HUB ---

        function App() {
            const [activeTab, setActiveTab] = useState('overview');

            const menu = [
                { id: 'overview', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'head', label: '1. Mindset', icon: 'brain' },
                { id: 'place', label: '2. Place', icon: 'map-pin' },
                { id: 'heart', label: '3. Soul', icon: 'heart' },
                { id: 'hands', label: '4. Skills', icon: 'sprout' },
                { id: 'economy', label: '5. Wallet', icon: 'trending-up' },
                { id: 'vision', label: '6. Legacy', icon: 'history' }
            ];

            const renderContent = () => {
                switch (activeTab) {
                    case 'head': return <HeadModule />;
                    case 'place': return <PlaceModule />;
                    case 'heart': return <HeartModule />;
                    case 'hands': return <HandsModule />;
                    case 'economy': return <EconomyModule />;
                    case 'vision': return <VisionModule />;
                    default: return (
                        <div className="animate-in space-y-10">
                            <header className="bg-slate-900 text-white p-16 rounded-[4rem] relative overflow-hidden shadow-2xl border-4 border-slate-800">
                                <div className="max-w-2xl relative z-10">
                                    <h1 className="text-7xl font-serif italic mb-8 leading-none tracking-tighter">Explorer Hub.</h1>
                                    <p className="text-slate-400 text-2xl leading-relaxed mb-12 italic">"The Metacrisis is not a death sentence; it is a Planetary Call to Adventure. Step out of the static screen and into the Life-Place where you stand."</p>
                                    <button onClick={() => setActiveTab('head')} className="bg-white text-slate-900 px-12 py-5 rounded-full font-black uppercase text-xs tracking-[0.3em] hover:scale-105 transition-transform flex items-center gap-3 shadow-xl">Begin Expedition <Icon name="arrow-right" size={20} /></button>
                                </div>
                                <Icon name="globe" size={600} className="absolute -bottom-40 -right-40 text-white opacity-[0.03] pointer-events-none" />
                            </header>

                            <div className="grid md:grid-cols-3 gap-8">
                                <Card className="bg-white p-10 border border-slate-100 shadow-lg border-l-8 border-l-blue-600">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Expedition Progress</h4>
                                    <div className="text-4xl font-black tracking-tighter">Level 2: Navigator</div>
                                    <div className="mt-6 w-full bg-slate-100 h-2 rounded-full overflow-hidden shadow-inner">
                                        <div className="bg-blue-600 w-1/3 h-full shadow-lg"></div>
                                    </div>
                                </Card>
                                <Card className="bg-white p-10 border border-slate-100 shadow-lg border-l-8 border-l-emerald-600">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Regional Retention</h4>
                                    <div className="text-4xl font-black tracking-tighter">25% Retained</div>
                                    <div className="mt-6 w-full bg-slate-100 h-2 rounded-full overflow-hidden shadow-inner">
                                        <div className="bg-emerald-600 w-1/4 h-full shadow-lg"></div>
                                    </div>
                                </Card>
                                <Card className="bg-white p-10 border border-slate-100 shadow-lg border-l-8 border-l-rose-600">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Soil Fitness</h4>
                                    <div className="text-4xl font-black tracking-tighter text-rose-900 italic">Optimum (Hot)</div>
                                    <div className="mt-6 w-full bg-slate-100 h-2 rounded-full overflow-hidden shadow-inner">
                                        <div className="bg-rose-600 w-full h-full shadow-lg"></div>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="min-h-screen flex selection:bg-blue-100">
                    <aside className="w-20 md:w-80 bg-white border-r border-slate-200 flex flex-col shrink-0">
                        <div className="p-10 border-b border-slate-50 hidden md:block">
                            <div className="flex items-center gap-4 group cursor-pointer">
                                <div className="w-14 h-14 bg-slate-900 text-white rounded-3xl flex items-center justify-center shadow-2xl group-hover:scale-105 transition-transform shadow-slate-300">
                                    <Icon name="compass" size={28} />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-black uppercase tracking-tighter italic text-2xl leading-none">Trailblazer</span>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mt-1">Campus Core</span>
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 py-10 px-6 space-y-2.5 overflow-y-auto custom-scrollbar">
                            {menu.map(i => (
                                <button 
                                    key={i.id} 
                                    onClick={() => setActiveTab(i.id)} 
                                    className={`w-full flex items-center gap-5 p-5 rounded-[1.5rem] transition-all duration-300 group ${activeTab === i.id ? 'bg-slate-900 text-white shadow-2xl shadow-slate-300 translate-x-2' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'}`}
                                >
                                    <Icon name={i.icon} className={`transition-colors ${activeTab === i.id ? 'text-blue-400' : 'group-hover:text-slate-900'}`} />
                                    <span className="hidden md:block font-black text-[12px] uppercase tracking-[0.1em]">{i.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-8 border-t border-slate-50 hidden md:block">
                            <Card className="bg-slate-50 p-6 border border-slate-100 rounded-[2rem]">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">"Weaving Resilience"</p>
                                <p className="text-[11px] font-bold text-slate-600">v3.0 • Systems-Health</p>
                            </Card>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto bg-slate-50/50">
                        <header className="bg-white/70 backdrop-blur-2xl border-b border-slate-200 px-12 py-8 sticky top-0 z-20 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse shadow-[0_0_10px_rgba(37,99,235,0.5)]"></div>
                                <span className="text-[12px] font-black uppercase tracking-[0.4em] text-slate-400">Explorer Session: Online</span>
                            </div>
                            <div className="flex gap-4 items-center">
                                <div className="hidden lg:flex flex-col text-right mr-4">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Bioregion</span>
                                    <span className="text-xs font-bold text-slate-900">Hudson Valley Watershed</span>
                                </div>
                                <div className="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-black text-sm shadow-xl cursor-pointer hover:bg-black transition-colors">U</div>
                            </div>
                        </header>
                        <div className="p-16 max-w-7xl mx-auto min-h-screen">
                            {renderContent()}
                        </div>
                        <footer className="p-16 border-t border-slate-200 flex justify-between items-center text-[11px] font-black uppercase tracking-[0.6em] text-slate-300 italic">
                            <span>Dancing with the Elephant</span>
                            <span>Collective Intelligence © 2026</span>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
